<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect,useCallback}=React;

function ellipsePt(cx,cy,rx,ry,a){return{x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)};}

// ── Srdce ── srdcová křivka, vepsaná do rx×ry. Dolní hrot i horní prohlubeň
// jsou seříznuté na rovnou vodorovnou hranu (jako u referenčního košíku).
function heartRaw(t){
  const x=16*Math.pow(Math.sin(t),3);
  const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x, y};
}
const _hb=(()=>{let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;for(let i=0;i<=720;i++){const p=heartRaw(i/720*Math.PI*2);minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y);}return{minX,maxX,minY,maxY,cx:(minX+maxX)/2,cy:(minY+maxY)/2,w:maxX-minX,h:maxY-minY};})();
// seříznutí v normalizovaných souřadnicích (ny: -1 nahoře/laloky .. +1 dole/hrot)
const HEART_CUT_BOT=8, HEART_CUT_NOTCH=16;   // mm seříznutí (přepočítá se podle ry)
function heartPt(cx,cy,rx,ry,t){
  const p=heartRaw(t);
  let nx=(p.x-_hb.cx)/(_hb.w/2);
  let ny=(p.y-_hb.cy)/(_hb.h/2);             // -1..1
  // y v mm od středu (kladné dolů)
  let ax=cx+nx*rx, ay=cy-ny*ry;
  // dolní hrot: y nesmí přesáhnout (cy+ry - cut)
  const botLimit=cy+ry-HEART_CUT_BOT;
  if(ay>botLimit)ay=botLimit;
  // horní prohlubeň: jen v centrální oblasti (|x|<55% rx) srovnat na rovnou hranu
  // dno prohlubně je nahoře (ay malé). Spočítáme úroveň prohlubně a posuneme ji výš o cut.
  return {x:ax, y:ay};
}
function heartNormal(cx,cy,rx,ry,t){
  const e=0.0015,a=heartPt(cx,cy,rx,ry,t-e),b=heartPt(cx,cy,rx,ry,t+e);
  const tx=b.x-a.x,ty=b.y-a.y,len=Math.hypot(tx,ty)||1;
  return {nx:ty/len, ny:-tx/len};  // vnější normála
}
// Body obrysu srdce se seříznutou horní prohlubní (dolní hrot řeší clamp v heartPt).
// Vrací pole {x,y} po obvodu (uzavřené), s rovnou hranou v prohlubni.
function heartOutline(cx,cy,rx,ry,N=360){
  const raw=[];for(let i=0;i<=N;i++){const t=(i/N)*Math.PI*2;raw.push(heartPt(cx,cy,rx,ry,t));}
  // úroveň prohlubně: dno výkroje = nejvyšší y (největší) mezi body s malým |x| v horní půlce
  const centerUp=raw.filter(p=>Math.abs(p.x-cx)<rx*0.04 && p.y<cy);
  if(!centerUp.length)return raw;
  const notchBottom=Math.max(...centerUp.map(p=>p.y));      // dno prohlubně (nejníž v horní části)
  const cutY=notchBottom-HEART_CUT_NOTCH*(ry/75);           // rovná hrana o kus výš
  // ořízni: body v centrální oblasti pod hranou (y>cutY) nahraď rovnou hranou
  const out=[];let prev=null;
  for(const cur of raw){
    const central=Math.abs(cur.x-cx)<rx*0.55 && cur.y<cy;   // jen horní střed
    if(prev){
      const pc=Math.abs(prev.x-cx)<rx*0.55 && prev.y<cy;
      if((prev.y>cutY)!==(cur.y>cutY) && (central||pc)){
        // průsečík s rovnou hranou
        const u=(cutY-prev.y)/(cur.y-prev.y);
        if(u>=0&&u<=1)out.push({x:prev.x+u*(cur.x-prev.x),y:cutY});
      }
    }
    if(!(central && cur.y>cutY))out.push(cur);
    prev=cur;
  }
  return out;
}
// Vnitřní obrys srdce = vnější odsazený dovnitř o konstantní vzdálenost `d` (konstantní šířka obruby).
function pathHeartInset(cx,cy,rx,ry,d,N=360){
  const o=heartOutline(cx,cy,rx,ry,N);
  const M=o.length;
  let inner=[];
  for(let i=0;i<M;i++){
    const a=o[(i-1+M)%M],b=o[(i+1)%M];
    const tx=b.x-a.x,ty=b.y-a.y,len=Math.hypot(tx,ty)||1;
    let nx=ty/len,ny=-tx/len;
    if((o[i].x-cx)*nx+(o[i].y-cy)*ny>0){nx=-nx;ny=-ny;}
    inner.push({x:o[i].x+nx*d, y:o[i].y+ny*d, ox:o[i].x, oy:o[i].y});
  }
  const tipY=Math.max(...o.map(p=>p.y));        // dolní špička
  const cutY=tipY-d*1.6;                         // nad špičkou: čistá rovná hrana vnitřku
  // Postav vnitřní obrys: body nad cutY ponech, úsek u špičky nahraď rovnou hranou.
  // Najdi, kde obrys vstupuje pod cutY (pravá strana) a kde vystupuje (levá strana).
  const out=[];let prev=null;
  for(let i=0;i<=M;i++){
    const cur=inner[i%M];
    if(prev){
      const cross=(prev.y>cutY)!==(cur.y>cutY);
      if(cross){
        const u=(cutY-prev.y)/(cur.y-prev.y);
        if(u>=0&&u<=1)out.push({x:prev.x+u*(cur.x-prev.x),y:cutY});
      }
    }
    if(cur.y<=cutY)out.push({x:cur.x,y:cur.y});
    prev=cur;
  }
  let path="M"+out[0].x.toFixed(2)+" "+out[0].y.toFixed(2)+" ";
  for(let i=1;i<out.length;i++)path+="L"+out[i].x.toFixed(2)+" "+out[i].y.toFixed(2)+" ";
  return path+"Z";
}
function pathHeart(cx,cy,rx,ry,N=360){
  const o=heartOutline(cx,cy,rx,ry,N);
  let d="M"+o[0].x.toFixed(2)+" "+o[0].y.toFixed(2)+" ";
  for(let i=1;i<o.length;i++)d+="L"+o[i].x.toFixed(2)+" "+o[i].y.toFixed(2)+" ";
  return d+"Z";
}
function heartPerim(rx,ry,N=360){const o=heartOutline(0,0,rx,ry,N);let L=0;for(let i=1;i<o.length;i++)L+=Math.hypot(o[i].x-o[i-1].x,o[i].y-o[i-1].y);return L;}
// Rozmístí n slotů po obrysu srdce. Slot v horní prohlubni (PŘESNĚ na ose) ANO,
// dolní hrana volná. Symetricky kolem svislé osy, rovnoměrně po délce.
function heartSlotPoints(cx,cy,rx,ry,n,N=720){
  const o=heartOutline(cx,cy,rx,ry,N);
  const M=o.length;
  // úroveň horní rovné hrany (prohlubeň): mezi body NEJBLÍŽ ose vezmi ten nejníže (max y),
  // to je dno seříznuté prohlubně (ne vrcholy laloků, které jsou výš = menší y)
  const axisPts=o.filter(p=>p.y<cy&&Math.abs(p.x-cx)<rx*0.16);
  const notchY=axisPts.length?Math.max(...axisPts.map(p=>p.y)):Math.min(...o.map(p=>p.y));
  // index bodu obrysu nejblíž prohlubni na ose
  let notchI=0,bd=1e9;for(let i=0;i<M;i++){const d=Math.abs(o[i].x-cx)+Math.abs(o[i].y-notchY);if(o[i].y<cy&&d<bd){bd=d;notchI=i;}}
  // kumulativní délka po celém obrysu od notchI
  const ord=[];for(let i=0;i<M;i++)ord.push(o[(notchI+i)%M]);
  ord.push(ord[0]);
  const dist=[0];for(let i=1;i<ord.length;i++)dist.push(dist[i-1]+Math.hypot(ord[i].x-ord[i-1].x,ord[i].y-ord[i-1].y));
  const total=dist[dist.length-1];
  const ptAtS=(s)=>{s=((s%total)+total)%total;let i=0;while(i<dist.length-1&&dist[i+1]<s)i++;const a=ord[i],b=ord[i+1]||ord[i];const seg=(dist[i+1]||total)-dist[i];const u=seg>0?(s-dist[i])/seg:0;return{x:a.x+u*(b.x-a.x),y:a.y+u*(b.y-a.y)};};
  const normAtS=(s)=>{const e=Math.max(0.5,total/400);const p0=ptAtS(s-e),p1=ptAtS(s+e);const tx=p1.x-p0.x,ty=p1.y-p0.y,len=Math.hypot(tx,ty)||1;let nx=ty/len,ny=-tx/len;const mid=ptAtS(s);if((mid.x-cx)*nx+(mid.y-cy)*ny<0){nx=-nx;ny=-ny;}return{nx,ny};};
  // najdi délkovou pozici dolní špičky (bod nejníž, max y) = konec pravé půlky
  let tipS=total/2, bd2=1e9;
  for(let s=0;s<total;s+=total/720){const p=ptAtS(s);const d=Math.abs(p.x-cx)+ (cy-p.y);/*chceme max y → min (cy-p.y)*/}
  // přesněji: projdi a najdi s s největším y
  {let by=-1e9;for(let s=0;s<total;s+=total/1440){const p=ptAtS(s);if(p.y>by){by=p.y;tipS=s;}}}
  // prohlubeň přesně na ose, normála -1 → slotSVG ji posune dovnitř (dolů do srdce)
  const pts=[{x:cx,y:notchY,nx:0,ny:-1}];
  const half=Math.floor((n-1)/2);
  for(let k=1;k<=half;k++){
    const s=(k/(half+0.5))*tipS;          // rovnoměrně od prohlubně k dolní špici (po pravé straně)
    const p=ptAtS(s),nm=normAtS(s);
    pts.push({x:p.x,y:p.y,nx:nm.nx,ny:nm.ny});
    pts.push({x:2*cx-p.x,y:p.y,nx:-nm.nx,ny:nm.ny});
  }
  return pts;
}
function pathEllipse(cx,cy,rx,ry,N=120){let d="";for(let i=0;i<=N;i++){const a=(i/N)*Math.PI*2,p=ellipsePt(cx,cy,rx,ry,a);d+=(i===0?"M":"L")+` ${p.x.toFixed(2)} ${p.y.toFixed(2)} `;}return d+"Z";}
function pathRect(cx,cy,rx,ry){const f=v=>v.toFixed(2);return `M${f(cx-rx)} ${f(cy-ry)} L${f(cx+rx)} ${f(cy-ry)} L${f(cx+rx)} ${f(cy+ry)} L${f(cx-rx)} ${f(cy+ry)}Z`;}
function ellipseNormal(a,rx,ry){const nx0=Math.cos(a)/(rx*rx),ny0=Math.sin(a)/(ry*ry),len=Math.sqrt(nx0*nx0+ny0*ny0);return{nx:nx0/len,ny:ny0/len};}

function calcSlotCount(shape,bW,bH,tW,tH,staveWidth,slotLen){
  const bRx=bW/2,bRy=shape==="round"?bRx:bH/2,tRx=tW/2,tRy=shape==="round"?tRx:tH/2;
  const aRx=(bRx+tRx)/2,aRy=(bRy+tRy)/2;
  let perim;
  if(shape==="rect") perim=2*(aRx*2+aRy*2);
  else if(shape==="round") perim=2*Math.PI*aRx;
  else if(shape==="heart") perim=heartPerim(aRx,aRy);
  else perim=Math.PI*(3*(aRx+aRy)-Math.sqrt((3*aRx+aRy)*(aRx+3*aRy)));
  // Pravidla: rozteč sloupků min. 35 mm (jinak šířka+20), vždy lichý počet (nahoru),
  // mezera mezi sloty (hrana–hrana) nikdy pod 1,6 cm.
  const pitch=Math.max(35,staveWidth+20);
  let n=Math.max(5,Math.ceil(perim/pitch));
  if(shape==="heart"){
    // srdce: cílová mezera mezi sloty ~20 mm (rozteč = šířka sloupku + 20 mm)
    const heartPitch=staveWidth+17;          // rozteč → pro obvod ~570 vyjde 21 sloupků
    let hn=Math.max(5,Math.round(perim/heartPitch));
    if(hn%2===0)hn++;                        // lichý: 1 v prohlubni + symetrické páry
    while(hn>5 && (perim/hn-slotLen)<14) hn-=2;   // mezera nesmí klesnout pod 14 mm
    return Math.max(5,hn);
  }
  if(n%2===0)n++;                                  // lichý, vždy nahoru
  while(n>3 && (perim/n-slotLen)<16) n-=2;         // tvrdá podmínka: mezera mezi sloty ≥ 16 mm
  if(n%2===0)n--;
  return Math.max(3,n);
}

function slotSVG(px,py,nx,ny,slotW,slotH,thick,offset,color){
  const f=v=>v.toFixed(2),tx=-ny,ty=nx;
  const depth=Math.max(1,thick-offset-1.5),actualH=Math.min(slotH,depth);
  const mx=px-nx*(offset+actualH/2),my=py-ny*(offset+actualH/2);
  const hw=slotW/2,hh=actualH/2;
  const p0=[mx+tx*hw+nx*hh,my+ty*hw+ny*hh],p1=[mx-tx*hw+nx*hh,my-ty*hw+ny*hh];
  const p2=[mx-tx*hw-nx*hh,my-ty*hw-ny*hh],p3=[mx+tx*hw-nx*hh,my+ty*hw-ny*hh];
  return `<path d="M${f(p0[0])} ${f(p0[1])} L${f(p1[0])} ${f(p1[1])} L${f(p2[0])} ${f(p2[1])} L${f(p3[0])} ${f(p3[1])}Z" fill="white" stroke="${color}" stroke-width="0.9"/>`;
}

function makeSlotAngles(n){return Array.from({length:n},(_,i)=>(i/n)*Math.PI*2);}
function makeRectSlotFracs(n,rx,ry,depth,offset,staveW=0){
  const W=rx*2,H=ry*2,perim=2*(W+H),margin=Math.max(depth+offset+3,Math.min(rx,ry)*0.1)+staveW;
  const result=[],sideLens=[W,H,W,H],counts=sideLens.map(l=>Math.max(1,Math.round((l/perim)*n)));
  for(let si=0;si<4;si++){const cnt=counts[si],usable=sideLens[si]-margin*2;if(usable<=0)continue;for(let i=0;i<cnt;i++){const t=cnt===1?0.5:i/(cnt-1);result.push({si,frac:(margin+t*usable)/sideLens[si]});}}
  return result;
}
function rectFracToPoint(cx,cy,rx,ry,si,frac){
  const W=rx*2,H=ry*2,sides=[
    {x0:cx-rx,y0:cy-ry,dx:1,dy:0,nx:0,ny:-1,len:W},
    {x0:cx+rx,y0:cy-ry,dx:0,dy:1,nx:1,ny:0,len:H},
    {x0:cx+rx,y0:cy+ry,dx:-1,dy:0,nx:0,ny:1,len:W},
    {x0:cx-rx,y0:cy+ry,dx:0,dy:-1,nx:-1,ny:0,len:H},
  ];
  const s=sides[si];return{px:s.x0+s.dx*frac*s.len,py:s.y0+s.dy*frac*s.len,nx:s.nx,ny:s.ny};
}

function buildBottom(cx,cy,rx,ry,shape,angles,rectFracs,slotW,slotH,thick,offset,color){
  const bodyD=shape==="rect"?pathRect(cx,cy,rx,ry):shape==="heart"?pathHeart(cx,cy,rx,ry):pathEllipse(cx,cy,rx,ry);
  const body=`<path d="${bodyD}" fill="#ffe8d8" stroke="${color}" stroke-width="1.2"/>`;
  let slots="";
  if(shape==="rect"&&rectFracs){
    for(const{si,frac}of rectFracs){const{px,py,nx,ny}=rectFracToPoint(cx,cy,rx,ry,si,frac);slots+=slotSVG(px,py,nx,ny,slotW,slotH,thick,offset,color);}
    const d2=1/Math.sqrt(2);
    const aH=Math.min(slotH,Math.max(1,thick-offset-1.5));
    const D=Math.SQRT2*offset+(slotW+aH)/2;  // nejbližší bod slotu = offset od obou hran rohu
    const shift=D-(offset+aH/2);
    const corners=[{px:cx-rx,py:cy-ry,nx1:-1,ny1:-1},{px:cx+rx,py:cy-ry,nx1:1,ny1:-1},{px:cx+rx,py:cy+ry,nx1:1,ny1:1},{px:cx-rx,py:cy+ry,nx1:-1,ny1:1}];
    for(const{px,py,nx1,ny1}of corners)slots+=slotSVG(px-nx1*d2*shift,py-ny1*d2*shift,nx1*d2,ny1*d2,slotW,slotH,thick,offset,color);
  } else if(shape==="heart"){
    const sp=heartSlotPoints(cx,cy,rx,ry,angles.length);
    for(const q of sp)slots+=slotSVG(q.x,q.y,q.nx,q.ny,slotW,slotH,thick,offset,color);
  } else {
    for(const a of angles){const p=ellipsePt(cx,cy,rx,ry,a),n=ellipseNormal(a,rx,ry);slots+=slotSVG(p.x,p.y,n.nx,n.ny,slotW,slotH,thick,offset,color);}
  }
  return body+slots;
}



function buildTop(cx,cy,oRx,oRy,thick,shape,angles,rectFracs,slotW,slotH,offset,color,puzzleJoint){
  const iRx=oRx-thick, iRy=oRy-thick;
  const f=v=>v.toFixed(3);

  const makeSlots=()=>{
    let slots="";
    if(shape==="rect"&&rectFracs){
      for(const{si,frac}of rectFracs){const{px,py,nx,ny}=rectFracToPoint(cx,cy,oRx,oRy,si,frac);slots+=slotSVG(px,py,nx,ny,slotW,slotH,thick,offset,color);}
      const d2=1/Math.sqrt(2);
      const aH=Math.min(slotH,Math.max(1,thick-offset-1.5));
      const D=Math.SQRT2*offset+(slotW+aH)/2;  // nejbližší bod slotu = offset od obou hran rohu
      const shift=D-(offset+aH/2);
      const corners=[{px:cx-oRx,py:cy-oRy,nx1:-1,ny1:-1},{px:cx+oRx,py:cy-oRy,nx1:1,ny1:-1},{px:cx+oRx,py:cy+oRy,nx1:1,ny1:1},{px:cx-oRx,py:cy+oRy,nx1:-1,ny1:1}];
      for(const{px,py,nx1,ny1}of corners)slots+=slotSVG(px-nx1*d2*shift,py-ny1*d2*shift,nx1*d2,ny1*d2,slotW,slotH,thick,offset,color);
    } else if(shape==="heart"){
      const sp=heartSlotPoints(cx,cy,oRx,oRy,angles.length);
      for(const q of sp)slots+=slotSVG(q.x,q.y,q.nx,q.ny,slotW,slotH,thick,offset,color);
    } else {
      for(const a of angles){const p=ellipsePt(cx,cy,oRx,oRy,a),nn=ellipseNormal(a,oRx,oRy);slots+=slotSVG(p.x,p.y,nn.nx,nn.ny,slotW,slotH,thick,offset,color);}
    }
    return slots;
  };

  if(!puzzleJoint){
    let outerD,innerD;
    if(shape==="rect"){
      outerD=pathRect(cx,cy,oRx,oRy);
      innerD=`M${f(cx-iRx)} ${f(cy-iRy)} L${f(cx-iRx)} ${f(cy+iRy)} L${f(cx+iRx)} ${f(cy+iRy)} L${f(cx+iRx)} ${f(cy-iRy)}Z`;
    } else if(shape==="heart"){
      outerD=pathHeart(cx,cy,oRx,oRy);
      innerD=pathHeartInset(cx,cy,oRx,oRy,thick);
    } else {
      outerD=pathEllipse(cx,cy,oRx,oRy);
      innerD=pathEllipse(cx,cy,iRx,iRy);
    }
    return `<path d="${outerD} ${innerD}" fill-rule="evenodd" fill="#ffe8d8" stroke="${color}" stroke-width="1.2"/>`+makeSlots();
  }

  // ═══ PUZZLE SPOJ = jedna řezná křivka napříč obrubou ═══
  // Profil: mechanický háčkový spoj – dva prsty se vzájemně zaklesnou (jako u puzzle).
  // Existuje pouze jedna čára řezu; rozdělením vznikne samec i samice.

  // Umístění spoje: vlevo na obrubě, vycentrované mezi sousední sloty
  // (včetně tečného přesahu hlavičky tb+hd = 0.30·dlen)
  let iX,iY,oX,oY;
  if(shape==="rect"){
    // levá strana hranolu (si=3); najdi dvojici sousedních slotů nejblíž středu
    const ys=(rectFracs||[]).filter(q=>q.si===3).map(q=>cy+oRy-q.frac*oRy*2).sort((a,b)=>a-b);
    let yJ=cy;
    if(ys.length>=2){
      let best=[ys[0],ys[1]],bd=1e9;
      for(let i=0;i<ys.length-1;i++){const mid=(ys[i]+ys[i+1])/2,d0=Math.abs(mid-cy);if(d0<bd){bd=d0;best=[ys[i],ys[i+1]];}}
      yJ=(best[0]+best[1])/2;
    }
    yJ+=thick*0.15; // výrůstek míří k −y, posuň čáru o polovinu jeho přesahu
    iX=cx-iRx; iY=yJ; oX=cx-oRx; oY=yJ;
  } else if(shape==="heart"){
    // srdce: spoj KOLMO na obrys, umístěný do MEZERY mezi dva sousední sloty na pravém boku.
    const ot=heartOutline(cx,cy,oRx,oRy,720);
    const M2=ot.length;
    // pozice slotů na obrubě
    const sp=heartSlotPoints(cx,cy,oRx,oRy,angles.length);
    // vyber dva sousední sloty na pravém boku (x>cx, blízko výšky středu) → spoj do jejich středu
    const rightSlots=sp.filter(q=>q.x>cx+oRx*0.3).sort((a,b)=>a.y-b.y);
    let mid;
    if(rightSlots.length>=2){
      // dvojice nejblíž výšce cy
      let best=[rightSlots[0],rightSlots[1]],bd=1e9;
      for(let i=0;i<rightSlots.length-1;i++){const my=(rightSlots[i].y+rightSlots[i+1].y)/2;const d0=Math.abs(my-cy);if(d0<bd){bd=d0;best=[rightSlots[i],rightSlots[i+1]];}}
      mid={x:(best[0].x+best[1].x)/2,y:(best[0].y+best[1].y)/2};
    } else {
      mid={x:cx+oRx,y:cy};
    }
    // najdi bod obrysu nejblíž tomuto středu mezery
    let bi=0,bd2=1e9;for(let i=0;i<M2;i++){const d=Math.hypot(ot[i].x-mid.x,ot[i].y-mid.y);if(d<bd2){bd2=d;bi=i;}}
    const oP=ot[bi];
    const a=ot[(bi-3+M2)%M2],b=ot[(bi+3)%M2];
    const tx=b.x-a.x,ty=b.y-a.y,len=Math.hypot(tx,ty)||1;
    let nx=ty/len,ny=-tx/len;
    if((oP.x-cx)*nx+(oP.y-cy)*ny<0){nx=-nx;ny=-ny;}
    oX=oP.x; oY=oP.y;
    iX=oP.x-nx*thick; iY=oP.y-ny*thick;
  } else {
    let splitAng;
    {
      let below=-1e9, above=1e9;
      for(const a of angles){ if(a<Math.PI&&a>below)below=a; if(a>=Math.PI&&a<above)above=a; }
      if(below===-1e9)below=Math.max(...angles)-Math.PI*2;
      if(above=== 1e9)above=Math.min(...angles)+Math.PI*2;
      splitAng=(below+above)/2;
      const iX0=cx+Math.cos(splitAng)*iRx, iY0=cy+Math.sin(splitAng)*iRy;
      const oX0=cx+Math.cos(splitAng)*oRx, oY0=cy+Math.sin(splitAng)*oRy;
      const dl0=Math.hypot(oX0-iX0,oY0-iY0);
      const ntx0=-(oY0-iY0)/dl0, nty0=(oX0-iX0)/dl0;
      const Tx=-Math.sin(splitAng), Ty=Math.cos(splitAng);
      const s=(ntx0*Tx+nty0*Ty)>0?1:-1;
      const rMid=Math.hypot((iX0+oX0)/2-cx,(iY0+oY0)/2-cy);
      splitAng -= s*(dl0*0.30/2)/rMid;
    }
    iX=cx+Math.cos(splitAng)*iRx; iY=cy+Math.sin(splitAng)*iRy;
    oX=cx+Math.cos(splitAng)*oRx; oY=cy+Math.sin(splitAng)*oRy;
  }

  // Lokální osy: nr = radiálně (inner→outer), nt = tečně
  const ddx=oX-iX, ddy=oY-iY;
  const dlen=Math.sqrt(ddx*ddx+ddy*ddy);
  const nrx=ddx/dlen, nry=ddy/dlen;
  const ntx=-nry, nty=nrx;

  // Lokální souřadnice (lr = napříč obrubou, lt = tečně) → globální bod
  const PT=(lr,lt)=>[iX+lr*nrx+lt*ntx, iY+lr*nry+lt*nty];

  // Geometrie spoje (dle náčrtu: krček + rozšířená hlavička tvaru T/hříbek)
  // U úzké obruby drží minimální absolutní rozměry, aby spoj zůstal pevný.
  const nw  = Math.max(dlen*0.10,1.5);    // polovina šířky krčku (radiálně)
  const hw  = Math.max(dlen*0.18,nw+1.2); // polovina šířky hlavičky – širší než krček => zámek
  const tb  = Math.max(dlen*0.12,1.5);    // délka krčku (tečně)
  const hd  = Math.max(dlen*0.18,2.5);    // hloubka hlavičky (tečně)
  const rad = dlen*0.12; // max. zaoblení rohů
  const pos = dlen*0.50; // střed spoje napříč obrubou

  // Kvadratický oblouk vzorkovaný na L segmenty (v path jen M/L => DXF export funguje)
  const quad=(p0,c,p1,n=8)=>{const o=[];for(let i=1;i<=n;i++){const t=i/n,u=1-t;
    o.push([u*u*p0[0]+2*u*t*c[0]+t*t*p1[0],u*u*p0[1]+2*u*t*c[1]+t*t*p1[1]]);}return o;};

  // Rohové body JEDINÉ dělicí křivky (lokálně: [tečně, radiálně])
  // vnitřní okraj │ → obrys T-hlavičky → │ vnější okraj
  // Po rozdělení: jeden díl má čep (samec), druhý kapsu s převislými rty (samice).
  const corner=[
    [0,0],[0,pos-nw],[tb,pos-nw],[tb,pos-hw],[tb+hd,pos-hw],
    [tb+hd,pos+hw],[tb,pos+hw],[tb,pos+nw],[0,pos+nw],[0,dlen]
  ];
  // adaptivní zaoblení rohů, aby se sousední oblouky nepřekrývaly
  const loc=[corner[0]];
  for(let i=1;i<corner.length-1;i++){
    const A0=corner[i-1],B0=corner[i],C0=corner[i+1];
    const l1=Math.hypot(B0[0]-A0[0],B0[1]-A0[1]),l2=Math.hypot(C0[0]-B0[0],C0[1]-B0[1]);
    const rr=Math.min(rad,l1*0.45,l2*0.45);
    const e1=[B0[0]+(A0[0]-B0[0])/l1*rr,B0[1]+(A0[1]-B0[1])/l1*rr];
    const e2=[B0[0]+(C0[0]-B0[0])/l2*rr,B0[1]+(C0[1]-B0[1])/l2*rr];
    loc.push(e1,...quad(e1,B0,e2));
  }
  loc.push(corner[corner.length-1]);

  // Konce leží PŘESNĚ na okrajích: [0,0] = bod vnitřní elipsy, [0,dlen] = bod vnější elipsy
  const puzzleCutPath="M"+loc.map(([lt,lr])=>{const g=PT(lr,lt);return `${f(g[0])},${f(g[1])}`;}).join(" L");

  const outerD2=shape==="rect"?pathRect(cx,cy,oRx,oRy):shape==="heart"?pathHeart(cx,cy,oRx,oRy):pathEllipse(cx,cy,oRx,oRy);
  const innerD2=shape==="rect"?pathRect(cx,cy,iRx,iRy):shape==="heart"?pathHeartInset(cx,cy,oRx,oRy,thick):pathEllipse(cx,cy,iRx,iRy);
  const ring=`<path d="${outerD2} ${innerD2}" fill-rule="evenodd" fill="#ffe8d8" stroke="${color}" stroke-width="1.2"/>`;
  const puzzleCut=`<path d="${puzzleCutPath}" fill="none" stroke="${color}" stroke-width="1.0" stroke-linecap="round" stroke-linejoin="round"/>`;
  return `<g>${ring}${puzzleCut}${makeSlots()}</g>`;
}

function buildStave(cx,cy,sw,totalH,tnw,tl,bendType,bendAmt,waist,bulge,color){
  const f=v=>v.toFixed(2);
  // Konce: tělo → rozšířený límec (dosedne na obrubu) → rovný čep
  // hluboký přesně jako překližka (nevyčnívá ven), dva pružné prořezy.
  const cw=sw*1.2, ch=5;
  const chf=0.5, chh=1;   // sražení špičky čepu: 0,5 mm do strany, 1 mm na výšku (náběh)
  const t2=tnw/2, bodyTop=cy+tl, bodyBot=cy+totalH-tl;
  const wAt=t=>{if(bendType==="vase"){const d=Math.abs(t-.5);return waist+(1-waist)*(d/.5)**1.8;}if(bendType==="bulge"){const d=Math.abs(t-.5);return 1+(bulge-1)*(1-(d/.5)**2);}return 1;};
  // J-křivka s rovným náběhem u obou čepů: prvních a posledních ~12 % výšky jde
  // tělo svisle (kolmo do čepu), uprostřed plynulý oblív → čep navazuje rovně.
  const ease=t=>{const e=0.12; if(t<e)return 0; if(t>1-e)return 1; const u=(t-e)/(1-2*e); return (1-Math.cos(u*Math.PI))/2;};
  const bAt=t=>bendType==="S"?bendAmt*ease(t):0;
  const steps=30,Rt=[],Lt=[];
  for(let i=0;i<=steps;i++){const t=i/steps,yy=bodyTop+ch+t*(bodyBot-bodyTop-2*ch),w=wAt(t)*sw/2,bx=bAt(t);Rt.push([cx+bx+w,yy]);Lt.push([cx+bx-w,yy]);}
  const bTop=Rt.length?(Rt[0][0]+Lt[0][0])/2-cx:0;        // posun těla u horního čepu
  const bBot=Rt.length?(Rt[steps][0]+Lt[steps][0])/2-cx:0; // posun těla u dolního čepu
  const uT=cx+bTop, uB=cx+bBot;                            // osy horního a dolního čepu
  const pts=[
    [uT-t2+chf,cy],[uT+t2-chf,cy],[uT+t2,cy+chh],[uT+t2,bodyTop],[uT+cw/2,bodyTop],
    ...Rt,
    [uB+cw/2,bodyBot],[uB+t2,bodyBot],[uB+t2,cy+totalH-chh],[uB+t2-chf,cy+totalH],
    [uB-t2+chf,cy+totalH],[uB-t2,cy+totalH-chh],[uB-t2,bodyBot],[uB-cw/2,bodyBot],
    ...Lt.slice().reverse(),
    [uT-cw/2,bodyTop],[uT-t2,bodyTop],[uT-t2,cy+chh]
  ];
  const d="M"+pts.map(q=>`${f(q[0])} ${f(q[1])}`).join(" L")+"Z";
  let svg=`<path d="${d}" fill="#ffe8d8" stroke="${color}" stroke-width="1"/>`;
  // dva pružné prořezy v každém čepu (řezné čáry, kerf vytvoří mezeru)
  const so=tnw*0.25, sl=tl;
  svg+=`<path d="M${f(uT-so)} ${f(cy)} L${f(uT-so)} ${f(cy+sl)}" fill="none" stroke="${color}" stroke-width="0.8"/>`;
  svg+=`<path d="M${f(uT+so)} ${f(cy)} L${f(uT+so)} ${f(cy+sl)}" fill="none" stroke="${color}" stroke-width="0.8"/>`;
  svg+=`<path d="M${f(uB-so)} ${f(cy+totalH)} L${f(uB-so)} ${f(cy+totalH-sl)}" fill="none" stroke="${color}" stroke-width="0.8"/>`;
  svg+=`<path d="M${f(uB+so)} ${f(cy+totalH)} L${f(uB+so)} ${f(cy+totalH-sl)}" fill="none" stroke="${color}" stroke-width="0.8"/>`;
  return svg;
}

function generateSVG(p,slotCount){
  const{shape,bottomW,bottomH,topW,topH,basketHeight,matThick,staveWidth,
    bendType,bendAmount,waistRatio,bulgeRatio,ringThickness,kerf,puzzleJoint,slotOrient,lid}=p;
  const color="#cc2200";
  const bRx=bottomW/2,bRy=shape==="round"?bRx:bottomH/2,tRx=topW/2,tRy=shape==="round"?tRx:topH/2;
  // ── vše odvozeno z tloušťky překližky ──
  const tnw=staveWidth;                      // šířka čepu = šířka sloupku
  const tl=matThick;                         // hloubka čepu = tloušťka překližky (nevyčnívá)
  const upright=slotOrient==="rad";          // orientace slotů: naležato / nastojato
  const slotW=Math.max(1,(upright?matThick:tnw)-kerf);  // tečný rozměr slotu
  const slotH=Math.max(1,(upright?tnw:matThick)-kerf);  // radiální rozměr slotu
  const edgeOffsetBot=Math.max(4,(ringThickness-slotH)/2); // dno: slot min. 4 mm od kraje
  const edgeOffsetTop=(ringThickness-slotH)/2;             // obruba: slot ve středu pásu
  const totalH=basketHeight+tl*2,M=24;
  const angles=makeSlotAngles(slotCount);
  const rectFr=shape==="rect"?makeRectSlotFracs(slotCount,bRx,bRy,slotH,edgeOffsetBot,staveWidth):null;
  const botFracs=rectFr, topFracs=rectFr;
  const staveCount=rectFr?rectFr.length:slotCount;
  let parts=[];
  const bCX=M+bRx,bCY=M+bRy;
  parts.push(`<g><text x="${M}" y="${M-5}" font-size="9" fill="#999" font-family="sans-serif">Dno (1×) — ${bottomW}×${shape==="round"?bottomW:bottomH}mm</text>${buildBottom(bCX,bCY,bRx,bRy,shape,angles,botFracs,slotW,slotH,ringThickness,edgeOffsetBot,color)}</g>`);
  const tOffX=M+bottomW+30,tCX=tOffX+tRx,tCY=M+tRy;
  parts.push(`<g><text x="${tOffX}" y="${M-5}" font-size="9" fill="#999" font-family="sans-serif">Horní obruba (1×) — ${topW}×${shape==="round"?topW:topH}mm${puzzleJoint?" [puzzle]":""}</text>${buildTop(tCX,tCY,tRx,tRy,ringThickness,shape,angles,topFracs,slotW,slotH,edgeOffsetTop,color,puzzleJoint)}</g>`);
  const _aRx2=(bRx+tRx)/2,_aRy2=(bRy+tRy)/2;
  const _perim2=shape==="rect"?2*(_aRx2*2+_aRy2*2):shape==="round"?2*Math.PI*_aRx2:Math.PI*(3*(_aRx2+_aRy2)-Math.sqrt((3*_aRx2+_aRy2)*(_aRx2+3*_aRy2)));
  const _gapSlots=(_perim2/staveCount-Math.max(slotW,slotH)).toFixed(1);
  const bendW=bendType==="S"?Math.abs(bendAmount):0;       // vyklonění přidá k šířce sloupku
  const ringH=Math.max(bRy*2,tRy*2)+30,stavY=M+ringH+22,sp2=staveWidth*1.2+bendW+12,perRow=Math.max(1,Math.floor(1000/sp2)),rows=Math.ceil(staveCount/perRow);
  parts.push(`<text x="${M}" y="${stavY-7}" font-size="9" fill="#999" font-family="sans-serif">Sloupky (${staveCount}×) — výška ${totalH.toFixed(0)}mm, čep ${tnw.toFixed(1)}×${matThick.toFixed(1)}mm, sloty ${_gapSlots}mm od sebe</text>`);
  for(let i=0;i<staveCount;i++){const col=i%perRow,row=Math.floor(i/perRow);parts.push(buildStave(M+col*sp2+sp2/2,stavY+row*(totalH+14),staveWidth,totalH,tnw,tl,bendType,bendAmount,waistRatio,bulgeRatio,color));}
  let totalW=Math.max(tOffX+topW+M,perRow*sp2+M*2),totalH2=stavY+rows*(totalH+14)+M;
  if(shape==="rect"){
    const cY=totalH2+10;
    parts.push(`<text x="${M}" y="${cY-5}" font-size="9" fill="#999" font-family="sans-serif">Rohové sloupky (4×)</text>`);
    for(let i=0;i<4;i++)parts.push(buildStave(M+i*sp2+sp2/2,cY,staveWidth,totalH,tnw,tl,"straight",0,1,1,color));
    totalH2=cY+totalH+M;
  }
  // ── Kroužek na obrubu (jen ovál/kruh) ── mezikruží, vnější = obruba, šířka = 3/4 obruby,
  // BEZ slotů. Přilepí se na obrubu (zakryje sloty, zmenší otvor). Vyříznutý vnitřek slouží jako víko.
  if(lid&&(shape==="round"||shape==="oval")){
    const lidY=totalH2+10;
    const oRx=tRx,oRy=tRy;
    const ringW=ringThickness*0.75;                         // šířka kroužku = 3/4 obruby
    const iRx=tRx-ringW,iRy=tRy-ringW;
    const cxL=M+oRx,cyL=lidY+oRy;
    const outerD=shape==="round"?pathEllipse(cxL,cyL,oRx,oRx):pathEllipse(cxL,cyL,oRx,oRy);
    const innerD=shape==="round"?pathEllipse(cxL,cyL,iRx,iRx):pathEllipse(cxL,cyL,iRx,iRy);
    parts.push(`<text x="${M}" y="${lidY-5}" font-size="9" fill="#999" font-family="sans-serif">Kroužek na obrubu (1×) — vnější ${(oRx*2).toFixed(0)}×${(oRy*2).toFixed(0)}, šířka ${ringW.toFixed(0)}mm · vnitřek = víko</text>`);
    parts.push(`<path d="${outerD} ${innerD}" fill-rule="evenodd" fill="#ffe8d8" stroke="${color}" stroke-width="1.2"/>`);
    totalH2=lidY+oRy*2+M;
    totalW=Math.max(totalW,cxL+oRx+M);
  }
  return{svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH2}" viewBox="0 0 ${totalW} ${totalH2}" style="background:white">${parts.join("")}</svg>`};
}

function toDXF(svgStr){
  const polygons=[],pathRe=/<path[^>]*d="([^"]+)"[^>]*\/>/g;let m;
  while((m=pathRe.exec(svgStr))!==null){
    const raw=m[1].trim(),isClosed=raw.toUpperCase().includes('Z');
    const subpaths=raw.split(/(?=M\s*[-\d])/i).filter(s=>s.trim().length>0);
    for(const sub of subpaths){
      const pts=[],cmdRe=/([ML])\s*([-\d.]+)[\s,]+([-\d.]+)/gi;let c;
      while((c=cmdRe.exec(sub))!==null)pts.push([parseFloat(c[2]),parseFloat(c[3])]);
      if(pts.length<2)continue;
      let p=[...pts];
      const first=p[0],last=p[p.length-1];
      if(Math.abs(first[0]-last[0])<0.01&&Math.abs(first[1]-last[1])<0.01)p=p.slice(0,-1);
      if(isClosed)polygons.push({pts:p,closed:true});
      else polygons.push({pts:p,closed:false});
    }
  }
  const f=v=>v.toFixed(4);let entities='';
  for(const{pts,closed}of polygons){
    if(pts.length<2)continue;
    entities+=`0\nLWPOLYLINE\n8\n0\n70\n${closed?1:0}\n90\n${pts.length}\n`;
    for(const[x,y]of pts)entities+=`10\n${f(x)}\n20\n${f(y)}\n`;
  }
  return `0\nSECTION\n2\nHEADER\n9\n$ACADVER\n1\nAC1015\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n${entities}0\nENDSEC\n0\nEOF\n`;
}


function Canvas3D({p,slotCount}){
  const ref=useRef(null),rot=useRef({x:0.35,y:0.5}),drag=useRef(false),last=useRef({x:0,y:0}),raf=useRef(null);
  const draw=useCallback(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d"),W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W);bg.addColorStop(0,"#1e0e04");bg.addColorStop(1,"#070401");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const{shape,bottomW,bottomH,topW,topH,basketHeight,matThick,bendType,bendAmount,waistRatio,bulgeRatio,ringThickness}=p;
    const bRx=bottomW/2,bRy=shape==="round"?bRx:bottomH/2,tRx=topW/2,tRy=shape==="round"?tRx:topH/2;
    const bh=basketHeight,sc=Math.min(W,H)/Math.max(Math.max(topW,bottomW)*1.2,bh*1.5)*0.52,pcx=W/2,pcy=H/2+bh*sc*0.06,rx=rot.current.x,ry=rot.current.y;
    const proj=(x,y,z)=>{const cy2=Math.cos(ry),sy2=Math.sin(ry),x1=x*cy2-z*sy2,z1=x*sy2+z*cy2,cx2=Math.cos(rx),sx2=Math.sin(rx),y1=y*cx2-z1*sx2,z2=y*sx2+z1*cx2,fv=800/(800+z2*sc+350);return{sx:pcx+x1*sc*fv,sy:pcy+y1*sc*fv};};
    const sp=(brx,bry,a)=>{if(shape==="rect"){const cos=Math.cos(a),sin=Math.sin(a),s=Math.min(Math.abs(cos)>1e-9?Math.abs(brx/cos):1e9,Math.abs(sin)>1e-9?Math.abs(bry/sin):1e9);return{x:cos*s,z:sin*s};}if(shape==="heart"){const x=16*Math.pow(Math.sin(a),3),y=13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a);return{x:(x/16)*brx,z:-(y/17)*bry};}return{x:brx*Math.cos(a),z:bry*Math.sin(a)};};
    const wAt=t=>{if(bendType==="vase"){const d=Math.abs(t-.5);return waistRatio+(1-waistRatio)*(d/.5)**1.8;}if(bendType==="bulge"){const d=Math.abs(t-.5);return 1+(bulgeRatio-1)*(1-(d/.5)**2);}return 1;};
    ctx.save();ctx.beginPath();for(let i=0;i<=64;i++){const a=(i/64)*Math.PI*2,r=sp(bRx,bRy,a),pp=proj(r.x,bh/2,r.z);i===0?ctx.moveTo(pp.sx,pp.sy):ctx.lineTo(pp.sx,pp.sy);}ctx.closePath();ctx.fillStyle="#7a4208";ctx.fill();ctx.strokeStyle="#3a1600";ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    ctx.save();ctx.beginPath();for(let i=0;i<=80;i++){const a=(i/80)*Math.PI*2,r=sp(tRx,tRy,a),pp=proj(r.x,-bh/2,r.z);i===0?ctx.moveTo(pp.sx,pp.sy):ctx.lineTo(pp.sx,pp.sy);}ctx.closePath();ctx.strokeStyle="#6a3010";ctx.lineWidth=Math.max(3,ringThickness*sc*0.04);ctx.stroke();ctx.restore();
    for(let i=0;i<slotCount;i++){const a=(i/slotCount)*Math.PI*2,dot=Math.cos(a-ry);ctx.save();ctx.globalAlpha=dot>0?1:0.14;ctx.beginPath();for(let s=0;s<=24;s++){const t=s/24,pr=wAt(t),bend=0,cRx=bRx+(tRx-bRx)*t,cRy=bRy+(tRy-bRy)*t,r=sp(cRx*pr+bend,cRy*pr+bend,a),pp=proj(r.x,bh/2-t*bh,r.z);s===0?ctx.moveTo(pp.sx,pp.sy):ctx.lineTo(pp.sx,pp.sy);}ctx.strokeStyle=dot>0?"#C47A2B":"#6B3A0F";ctx.lineWidth=Math.max(1.5,matThick*sc*0.8);ctx.lineCap="round";ctx.stroke();ctx.restore();}
  },[p,slotCount]);
  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{let alive=true;const loop=()=>{if(!alive)return;if(!drag.current){rot.current.y+=0.007;draw();}raf.current=requestAnimationFrame(loop);};raf.current=requestAnimationFrame(loop);return()=>{alive=false;cancelAnimationFrame(raf.current);};},[draw]);
  const dn=(x,y)=>{drag.current=true;last.current={x,y};};
  const mv=(x,y)=>{if(!drag.current)return;rot.current.y+=(x-last.current.x)*0.012;rot.current.x=Math.max(-1.1,Math.min(1.1,rot.current.x+(y-last.current.y)*0.012));last.current={x,y};draw();};
  const up=()=>{drag.current=false;};
  return <canvas ref={ref} width={380} height={300} style={{width:"100%",borderRadius:12,cursor:"grab",display:"block"}} onMouseDown={e=>dn(e.clientX,e.clientY)} onMouseMove={e=>mv(e.clientX,e.clientY)} onMouseUp={up} onMouseLeave={up} onTouchStart={e=>dn(e.touches[0].clientX,e.touches[0].clientY)} onTouchMove={e=>{e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);}} onTouchEnd={up}/>;
}

function Sl({label,value,min,max,step=1,unit="mm",onChange}){
  const dec=()=>onChange(Math.max(min,+(value-step).toFixed(2))),inc=()=>onChange(Math.min(max,+(value+step).toFixed(2)));
  const btn={width:26,height:26,borderRadius:6,border:"1px solid #3a1a06",background:"#1a0a02",color:"#c08040",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"};
  return <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
    <span style={{fontSize:10,color:"#8a6030",textTransform:"uppercase",letterSpacing:"0.05em",flex:1,minWidth:0}}>{label}</span>
    <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
      <button onClick={dec} style={btn}>‹</button>
      <input type="number" min={min} max={max} step={step} value={value} onChange={e=>{const v=+e.target.value;if(!isNaN(v))onChange(Math.min(max,Math.max(min,v)));}} style={{width:50,textAlign:"center",background:"#1a0a02",border:"1px solid #3a1a06",borderRadius:6,color:"#f0c060",fontFamily:"monospace",fontWeight:700,fontSize:13,padding:"3px 2px",MozAppearance:"textfield"}}/>
      <span style={{fontSize:10,color:"#7a5028",minWidth:16}}>{unit}</span>
      <button onClick={inc} style={btn}>›</button>
    </div>
  </div>;
}
function Sec({children}){return <div style={{fontSize:9,color:"#705028",textTransform:"uppercase",letterSpacing:"0.12em",borderBottom:"1px solid #2a1004",paddingBottom:3,marginBottom:8,marginTop:10}}>{children}</div>;}
function BG({options,value,onChange}){return <div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap"}}>{options.map(o=><button key={String(o.id)} onClick={()=>onChange(o.id)} style={{flex:1,minWidth:52,padding:"6px 3px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:value===o.id?"#b06818":"#221006",color:value===o.id?"#fff":"#8a6030"}}>{o.label}</button>)}</div>;}
function Toggle({label,value,onChange}){return <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:10,color:"#8a6030",textTransform:"uppercase",letterSpacing:"0.05em",flex:1}}>{label}</span><button onClick={()=>onChange(!value)} style={{padding:"4px 12px",borderRadius:6,border:"1px solid #3a1a06",background:value?"#6a3010":"#1a0a02",color:value?"#f0c060":"#7a5028",fontSize:11,fontWeight:700,cursor:"pointer"}}>{value?"✓ Zapnuto":"Vypnuto"}</button></div>;}

const DEF={shape:"round",bottomW:250,bottomH:180,topW:250,topH:180,basketHeight:100,matThick:3,
  bendType:"straight",bendAmount:14,waistRatio:0.6,bulgeRatio:1.35,puzzleJoint:false,slotOrient:"tan",
  // v UI
  ringThickness:10,staveWidth:10,kerf:0.2,manualCount:false,staveCountManual:23,flare:35,lid:false};

function App(){
  const [p,setP]=useState(DEF),[tab,setTab]=useState("3d"),[svg,setSvg]=useState({svg:""}),[donate,setDonate]=useState(false);
  const set=k=>v=>setP(prev=>{
    if(k==="shape"&&v==="heart"&&prev.shape!=="heart")
      return {...prev,shape:"heart",bottomW:200,bottomH:150,topW:200,topH:150,basketHeight:80,staveWidth:10};
    return {...prev,[k]:v};
  });
  // Režim "ošatka": vršek se dopočítá automaticky z prohnutí S-křivky
  // (horní konec sloupku se vykloní ven o flare → vršek = dno + 2×flare).
  const bowl=p.shape==="bowl";
  const heart=p.shape==="heart";
  const ep=(()=>{
    if(bowl){
      const flare=Math.round(p.basketHeight*0.4375);  // výška 80 → vyklonění 35 → vršek = dno+70
      const d=p.bottomW;
      return {...p,shape:"round",bottomW:d,bottomH:d,topW:d+2*flare,topH:d+2*flare,
              bendType:"S",bendAmount:flare,slotOrient:"rad"};
    }
    if(heart){
      // srdce: rovné svislé stěny (dno = vršek), rovné sloupky, sloty kolmo
      return {...p,topW:p.bottomW,topH:p.bottomH,bendType:"straight",bendAmount:0,slotOrient:"tan"};
    }
    return p;
  })();
  const tnwA=ep.staveWidth;
  const slotLen=(ep.slotOrient==="rad"?ep.matThick:tnwA)-ep.kerf;
  const autoCount=calcSlotCount(ep.shape,ep.bottomW,ep.bottomH,ep.topW,ep.topH,ep.staveWidth,slotLen);
  const slotCount=p.manualCount?p.staveCountManual:autoCount;
  useEffect(()=>{setSvg(generateSVG(ep,slotCount));},[ep,slotCount]);
  const track=(path)=>{try{if(window.goatcounter&&window.goatcounter.count)window.goatcounter.count({path,title:path,event:true});}catch(e){}};
  const dl=(content,name,type)=>{const b64=btoa(unescape(encodeURIComponent(content)));const a=document.createElement("a");a.href=`data:${type};base64,${b64}`;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);track(name.endsWith(".dxf")?"stazeni-dxf":name.endsWith(".svg")?"stazeni-svg":"stazeni-"+name);};
  const isRound=ep.shape==="round"&&!bowl;
  const tnw=p.staveWidth,tl=p.matThick,totalH=p.basketHeight+tl*2;
  // aktuální mezera mezi sloty (hrana–hrana) na středním obvodu
  const _bRx=ep.bottomW/2,_bRy=isRound?_bRx:ep.bottomH/2,_tRx=ep.topW/2,_tRy=isRound?_tRx:ep.topH/2;
  const _aRx=(_bRx+_tRx)/2,_aRy=(_bRy+_tRy)/2;
  const _perim=p.shape==="rect"?2*(_aRx*2+_aRy*2):p.shape==="round"?2*Math.PI*_aRx:Math.PI*(3*(_aRx+_aRy)-Math.sqrt((3*_aRx+_aRy)*(_aRx+3*_aRy)));
  const slotLenCur=(ep.slotOrient==="rad"?ep.matThick:tnw)-ep.kerf;
  const gapStaves=(_perim/slotCount-tnw).toFixed(1);   // mezera mezi sloupky
  const gapSlots=(_perim/slotCount-slotLenCur).toFixed(1); // mezera mezi sloty

  return <div style={{minHeight:"100vh",background:"#0c0601",color:"#ddc898",fontFamily:"Georgia,serif"}}>
    <header style={{background:"rgba(0,0,0,0.8)",borderBottom:"1px solid #2e1406",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
      <div><div style={{fontSize:16,fontWeight:700,color:"#e8b030"}}>🧺 Generátor košíků</div><div style={{fontSize:9,color:"#6a4820"}}>Vzory pro laserovou řezačku · mm</div></div>

        <button onClick={()=>setDonate(d=>!d)} style={{padding:"6px 11px",borderRadius:7,border:"1px solid #5a3a10",cursor:"pointer",fontSize:11,fontWeight:700,background:"#3a2408",color:"#f0c060"}}>☕ Podpořit</button>
        <button onClick={()=>dl(svg.svg,"kosik.svg","image/svg+xml")} style={{padding:"6px 11px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"#183616",color:"#80c880"}}>↓ SVG</button>
        <button onClick={()=>dl(toDXF(svg.svg),"kosik.dxf","application/dxf")} style={{padding:"6px 11px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"#162436",color:"#80a8c8"}}>↓ DXF</button>
      </div>
    </header>
    {donate&&<div style={{margin:"10px 12px 0",background:"rgba(0,0,0,0.45)",border:"1px solid #5a3a10",borderRadius:12,padding:14,textAlign:"center"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#e8b030",marginBottom:8}}>☕ Podpořit vývoj generátoru</div>
      <img src={QR_DONATE} alt="Platba QR kódem" style={{width:210,height:210,borderRadius:10,background:"#fff",display:"block",margin:"0 auto"}}/>
      <div style={{fontSize:11,color:"#c09040",marginTop:8}}>QR kód pro příspěvek 50 Kč</div>
      <div style={{fontSize:11,color:"#c09040",marginTop:4}}>Nebo libovolná částka na účet:<br/><span style={{fontFamily:"monospace",color:"#f0c060",fontWeight:700,fontSize:13}}>670100-2219505424/6210</span></div>
      <button onClick={()=>setDonate(false)} style={{marginTop:10,padding:"6px 16px",borderRadius:7,border:"1px solid #5a3a10",background:"#221006",color:"#c09040",fontSize:11,cursor:"pointer"}}>Zavřít</button>
    </div>}
    <div style={{display:"flex",gap:4,padding:"10px 12px 0"}}>
      {[["3d","🧺 3D"],["pattern","📐 Vzory"]].map(([id,lbl])=>(
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"7px 4px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:tab===id?"#b06818":"#221006",color:tab===id?"#fff":"#8a6030"}}>{lbl}</button>
      ))}
    </div>
    <div style={{padding:"10px 12px"}}>
      {tab==="3d"&&<div style={{background:"#070401",borderRadius:12,border:"1px solid #2e1406",padding:8,marginBottom:12}}><Canvas3D p={ep} slotCount={slotCount}/><p style={{fontSize:10,color:"#3a2818",textAlign:"center",margin:"4px 0 0"}}>Táhněte pro otočení</p></div>}
      {tab==="pattern"&&<div style={{marginBottom:12}}>
        <div style={{background:"#fff",borderRadius:10,overflow:"auto",border:"2px solid #2e1406",maxHeight:"52vh"}}><div dangerouslySetInnerHTML={{__html:svg.svg}}/></div>
        <div style={{marginTop:8,display:"flex",gap:8}}>
          <button onClick={()=>dl(svg.svg,"kosik.svg","image/svg+xml")} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"#183616",color:"#80c880"}}>↓ SVG</button>
          <button onClick={()=>dl(toDXF(svg.svg),"kosik.dxf","application/dxf")} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"#162436",color:"#80a8c8"}}>↓ DXF</button>
        </div>
      </div>}

        {!bowl&&!heart&&<><Sec>Styl sloupků</Sec>
        <BG options={[{id:"straight",label:"Rovný"},{id:"S",label:"S-ohyb"}]} value={p.bendType} onChange={set("bendType")}/>
        {p.bendType==="S"&&<Sl label="Prohnutí" value={p.bendAmount} min={0} max={50} step={1} onChange={set("bendAmount")}/>}</>}
        {bowl?<>
          <Sec>Rozměry ošatky</Sec>
          <Sl label="Průměr dna" value={p.bottomW} min={60} max={500} step={5} onChange={set("bottomW")}/>
          <div style={{background:"rgba(255,200,100,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:10,color:"#c09040",lineHeight:1.6}}>
            Tvar sloupku i vršek se dopočítají z výšky:<br/>
            vyklonění {Math.round(p.basketHeight*0.4375)} mm · vršek <b style={{color:"#f0c060"}}>⌀ {p.bottomW+2*Math.round(p.basketHeight*0.4375)} mm</b> · sloty kolmo
          </div>
        </>:heart?<>
          <Sec>Rozměry srdce</Sec>
          <Sl label="Šířka srdce" value={p.bottomW} min={80} max={500} step={5} onChange={set("bottomW")}/>
          <Sl label="Výška srdce (rozměr)" value={p.bottomH} min={80} max={500} step={5} onChange={set("bottomH")}/>
          <div style={{background:"rgba(255,200,100,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:10,color:"#c09040",lineHeight:1.6}}>
            Rovné svislé stěny (dno = vršek), sloty kolmo. Sloupek je v hrotu i v prohlubni.
          </div>
        </>:<>
        <Sec>Rozměry dna</Sec>
        <Sl label="Šířka" value={p.bottomW} min={60} max={500} step={5} onChange={set("bottomW")}/>
        {!isRound&&<Sl label="Hloubka" value={p.bottomH} min={60} max={500} step={5} onChange={set("bottomH")}/>}
        <Sec>Rozměry vršku</Sec>
        <Sl label="Šířka" value={p.topW} min={60} max={500} step={5} onChange={set("topW")}/>
        {!isRound&&<Sl label="Hloubka" value={p.topH} min={60} max={500} step={5} onChange={set("topH")}/>}
        </>}
        <Sec>Výška a materiál</Sec>
        <Sl label="Výška sloupku (tělo)" value={p.basketHeight} min={40} max={400} step={5} onChange={set("basketHeight")}/>
        <Sl label="Šířka sloupku" value={p.staveWidth} min={8} max={40} step={1} onChange={set("staveWidth")}/>
        <Sl label="Šířka obruby" value={p.ringThickness} min={8} max={40} step={1} onChange={set("ringThickness")}/>
        <Sl label="Tloušťka překližky" value={p.matThick} min={2} max={8} step={0.1} onChange={set("matThick")}/>
        <Sl label="Prořez laseru (kerf)" value={p.kerf} min={0} max={1} step={0.05} onChange={set("kerf")}/>
        <Sec>Počet sloupků</Sec>
        <Toggle label="Nastavit ručně" value={p.manualCount} onChange={v=>{if(v)set("staveCountManual")(autoCount);set("manualCount")(v);}}/>
        {p.manualCount&&<Sl label="Počet sloupků" value={p.staveCountManual} min={3} max={120} step={1} unit="ks" onChange={set("staveCountManual")}/>}
        <div style={{background:"rgba(255,200,100,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:10,color:"#c09040",lineHeight:1.6}}>

        </div>
        {!bowl&&!heart&&<><Sec>Orientace slotů</Sec>
        <BG options={[{id:"tan",label:"Naležato (po obvodu)"},{id:"rad",label:"Nastojato (kolmo)"}]} value={p.slotOrient} onChange={set("slotOrient")}/></>}
        <div style={{background:"rgba(255,200,100,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:10,color:"#c09040",lineHeight:1.6}}>
          Sloty i čepy se dopočítají automaticky:<br/>
          slot {(p.slotOrient==="rad"?(p.matThick-p.kerf):(tnw-p.kerf)).toFixed(1)}×{(p.slotOrient==="rad"?(tnw-p.kerf):(p.matThick-p.kerf)).toFixed(1)}mm · čep {tnw.toFixed(1)}×{p.matThick.toFixed(1)}mm
        </div>
        <Sec>Puzzle spoj horní obruby</Sec>
        <Toggle label="Puzzle spoj (skládací)" value={p.puzzleJoint} onChange={set("puzzleJoint")}/>
        {(p.shape==="oval"||p.shape==="round")&&<>
          <Sec>Víko</Sec>
          <Toggle label="Přidat kroužek na obrubu" value={p.lid} onChange={set("lid")}/>
          {p.lid&&<div style={{background:"rgba(255,200,100,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:8,fontSize:10,color:"#c09040",lineHeight:1.6}}>
            Kroužek (3/4 šířky obruby) se přilepí na obrubu a zakryje sloty. Vyříznutý vnitřek použiješ jako víko.
          </div>}
        </>}
        <Sec>Přehled</Sec>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 10px",fontSize:11}}>
          {[["Dno",`${p.bottomW}×${isRound?p.bottomW:p.bottomH}mm`],["Vršek",`${p.topW}×${isRound?p.topW:p.topH}mm`],["Výška těla",`${p.basketHeight}mm`],["Sloupek",`${totalH.toFixed(0)}mm`],["Čep",`${tnw.toFixed(1)}×${p.matThick}mm`],["Sloupků",`${slotCount}${p.shape==="rect"?"+4r":""} ks`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #1e0c02",paddingBottom:3}}>
              <span style={{color:"#7a5028"}}>{k}</span><span style={{color:"#f0c060",fontFamily:"monospace",fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
